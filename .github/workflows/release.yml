name: Release

# Two halves, split by ref:
#  - release-please runs on push to main: it maintains the "chore: release main"
#    PR and, when that PR merges, creates the vX.Y.Z tag + GitHub release.
#  - the publish jobs run on a pushed v*.*.* tag (whether release-please created
#    it or you pushed one by hand). the tag is the single source of truth for
#    "publish this version", so a release-please hiccup can never silently
#    publish nothing, and you always have a manual escape hatch.
on:
  push:
    branches: [main]
    tags: ["v*.*.*"]

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      # a PAT (or the release-please app) is required so the release PR triggers
      # ci.yml; the default GITHUB_TOKEN would not trigger downstream workflows.
      - uses: googleapis/release-please-action@v4
        id: rp
        with:
          token: ${{ secrets.RELEASE_PLEASE_TOKEN }}

  # full gate, run on the pushed tag (race detector + all linters) before any publish.
  verify:
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - run: test -z "$(gofmt -l .)"
      - run: go vet ./...
      - run: go build ./...
      - run: go test ./... -race -count=1
      - uses: golangci/golangci-lint-action@v7
        with:
          version: v2.12.2
      - uses: goreleaser/goreleaser-action@v6
        with:
          version: "~> v2"
          args: check
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: sdks/typescript/package-lock.json
      - name: TS SDK checks
        working-directory: sdks/typescript
        run: |
          npm ci
          npm run lint
          npm run test
          npm run build
      - name: Go SDK module checks
        working-directory: sdks/go
        env:
          GOWORK: "off"
        run: |
          go build ./...
          go vet ./...
          go test ./... -race -count=1
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.13"
      - name: Python SDK checks
        working-directory: sdks/python
        run: |
          uv sync
          uv run ruff check src tests
          uv run mypy
          uv run pytest

  binaries:
    needs: verify
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - uses: goreleaser/goreleaser-action@v6
        with:
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}

  publish-npm:
    name: Publish TS SDK to npm
    needs: verify
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # oidc: npm trusted publishing + provenance
    defaults:
      run:
        working-directory: sdks/typescript
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
      - run: npm install -g npm@latest
      - run: npm ci
      - run: npm run lint
      - run: npm run test
      - run: npm run build
      # the tagged commit already carries the right version in package.json.
      - run: npm publish

  publish-pypi:
    name: Publish Python SDK to PyPI
    needs: verify
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # oidc: pypi trusted publishing
    defaults:
      run:
        working-directory: sdks/python
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.13"
      # the tagged commit already carries the right version in pyproject.toml.
      - run: uv build
      - run: uv publish

  tag-go-sdk:
    name: Tag Go SDK module
    needs: verify
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      # nested go module needs a path-prefixed tag for the proxy, kept in lockstep
      # with the unified version. derive it from the pushed tag (vX.Y.Z -> X.Y.Z).
      - name: Push lockstep module tag
        env:
          REF_NAME: ${{ github.ref_name }}
        run: |
          V="${REF_NAME#v}"
          if [ -z "${V}" ]; then echo "version is empty; refusing to tag" >&2; exit 1; fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "sdks/go/v${V}"
          git push origin "sdks/go/v${V}"
      - uses: actions/setup-go@v5
        with:
          go-version-file: sdks/go/go.mod
      - name: Warm the module proxy
        env:
          REF_NAME: ${{ github.ref_name }}
          GOPROXY: proxy.golang.org
        run: |
          V="${REF_NAME#v}"
          go list -m "github.com/folsomintel/fuse/sdks/go@v${V}" || true
