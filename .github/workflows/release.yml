name: Release

# Two halves, split by ref:
#  - release-please runs on push to main: it maintains the "chore: release main"
#    PR and, when that PR merges, creates the vX.Y.Z tag + GitHub release.
#  - the publish jobs run on a pushed v*.*.* tag (whether release-please created
#    it or you pushed one by hand). the tag is the single source of truth for
#    "publish this version", so a release-please hiccup can never silently
#    publish nothing, and you always have a manual escape hatch.
on:
  push:
    branches: [main]
    tags: ["v*.*.*"]

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    # Serialise: two pushes to main in quick succession (a feature PR and the
    # release PR right behind it) otherwise start overlapping runs that race on
    # the same release PR. Never cancel in progress, cancelling mid-release is
    # how a half-tagged state happens in the first place.
    concurrency:
      group: release-please-main
      cancel-in-progress: false
    steps:
      # a PAT (or the release-please app) is required so the release PR triggers
      # ci.yml; the default GITHUB_TOKEN would not trigger downstream workflows.
      - uses: googleapis/release-please-action@v4
        id: rp
        with:
          token: ${{ secrets.RELEASE_PLEASE_TOKEN }}

  # Backstop for release-please's release phase, which intermittently merges the
  # release PR without ever creating the tag. That leaves the PR labelled
  # `autorelease: pending`, and every later run aborts with "There are untagged,
  # merged release PRs outstanding" until someone tags by hand.
  #
  # The manifest version on main is the source of truth for "what should be
  # released": it only changes when a release PR merges. So if that version has
  # no tag, cut one. The tag-triggered publish jobs below then run exactly as
  # they would have, and relabelling the merged release PR unblocks
  # release-please for the next cycle.
  #
  # Idempotent: when release-please does its job, the tag already exists and
  # this is a no-op.
  tag-backstop:
    needs: release-please
    if: ${{ always() && github.ref == 'refs/heads/main' }}
    runs-on: ubuntu-latest
    concurrency:
      group: release-please-main-backstop
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          # A PAT, not GITHUB_TOKEN: a tag pushed with GITHUB_TOKEN does not
          # trigger workflows, so the publish half of this file would never fire.
          token: ${{ secrets.RELEASE_PLEASE_TOKEN }}
      - name: Tag the manifest version when it is untagged
        env:
          GH_TOKEN: ${{ secrets.RELEASE_PLEASE_TOKEN }}
        run: |
          set -euo pipefail
          git fetch --tags --force origin

          V="$(jq -r '.["."] // empty' .release-please-manifest.json)"
          if [ -z "${V}" ]; then
            echo "no version in .release-please-manifest.json; nothing to do"
            exit 0
          fi
          if git rev-parse -q --verify "refs/tags/v${V}" >/dev/null; then
            echo "v${V} is already tagged; release-please did its job"
            exit 0
          fi

          echo "manifest is at ${V} with no v${V} tag; cutting it"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "v${V}" -m "v${V}"
          git push origin "v${V}"

          # The docs /changelog page renders GitHub release bodies, not
          # CHANGELOG.md, so a bare tag would leave that version blank. Lift this
          # version's section out of the changelog release-please just wrote.
          NOTES="$(awk -v v="v${V}" '
            index($0, "## [" substr(v,2) "]") == 1 || index($0, "## " substr(v,2)) == 1 { flag=1; next }
            flag && /^## / { exit }
            flag { print }
          ' CHANGELOG.md)"
          if [ -n "${NOTES//[$'\n\t ']/}" ]; then
            printf '%s\n' "${NOTES}" | gh release create "v${V}" --title "v${V}" --notes-file -
          else
            gh release create "v${V}" --title "v${V}" --generate-notes
          fi

          # Let release-please move on instead of aborting on an untagged,
          # merged release PR next cycle.
          PR="$(gh pr list --state merged --label 'autorelease: pending' \
                  --limit 1 --json number -q '.[0].number // empty')"
          if [ -n "${PR}" ]; then
            gh pr edit "${PR}" --remove-label 'autorelease: pending' \
                               --add-label 'autorelease: tagged'
            echo "relabelled release PR #${PR} as autorelease: tagged"
          fi

  # full gate, run on the pushed tag (race detector + all linters) before any publish.
  verify:
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - run: test -z "$(gofmt -l .)"
      - run: go vet ./...
      - run: go build ./...
      - run: go test ./... -race -count=1
      - uses: golangci/golangci-lint-action@v7
        with:
          version: v2.12.2
      - uses: goreleaser/goreleaser-action@v6
        with:
          version: "~> v2"
          args: check
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: sdks/typescript/package-lock.json
      - name: TS SDK checks
        working-directory: sdks/typescript
        run: |
          npm ci
          npm run lint
          npm run test
          npm run build
      - name: Go SDK module checks
        working-directory: sdks/go
        env:
          GOWORK: "off"
        run: |
          go build ./...
          go vet ./...
          go test ./... -race -count=1
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.13"
      - name: Python SDK checks
        working-directory: sdks/python
        run: |
          uv sync
          uv run ruff check src tests
          uv run mypy
          uv run pytest

  binaries:
    needs: verify
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - uses: goreleaser/goreleaser-action@v6
        with:
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}

  publish-npm:
    name: Publish TS SDK to npm
    needs: verify
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # oidc: npm trusted publishing + provenance
    defaults:
      run:
        working-directory: sdks/typescript
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
      - run: npm install -g npm@latest
      - run: npm ci
      - run: npm run lint
      - run: npm run test
      - run: npm run build
      # the tagged commit already carries the right version in package.json.
      - run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  publish-pypi:
    name: Publish Python SDK to PyPI
    needs: verify
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # oidc: pypi trusted publishing
    defaults:
      run:
        working-directory: sdks/python
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.13"
      # the tagged commit already carries the right version in pyproject.toml.
      - run: uv build
      - run: uv publish

  tag-go-sdk:
    name: Tag Go SDK module
    needs: verify
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      # nested go module needs a path-prefixed tag for the proxy, kept in lockstep
      # with the unified version. derive it from the pushed tag (vX.Y.Z -> X.Y.Z).
      - name: Push lockstep module tag
        env:
          REF_NAME: ${{ github.ref_name }}
        run: |
          V="${REF_NAME#v}"
          if [ -z "${V}" ]; then echo "version is empty; refusing to tag" >&2; exit 1; fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "sdks/go/v${V}"
          git push origin "sdks/go/v${V}"
      - uses: actions/setup-go@v5
        with:
          go-version-file: sdks/go/go.mod
      - name: Warm the module proxy
        env:
          REF_NAME: ${{ github.ref_name }}
          GOPROXY: proxy.golang.org
        run: |
          V="${REF_NAME#v}"
          go list -m "github.com/folsomintel/fuse/sdks/go@v${V}" || true
