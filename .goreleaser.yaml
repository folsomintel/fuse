# GoReleaser configuration (v2 schema)
# Docs: https://goreleaser.com
version: 2

project_name: orchestrator

before:
  hooks:
    - go mod tidy

builds:
  - id: orchestrator
    main: ./cmd/orchestrator
    binary: orchestrator
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64
    # main.version is stamped here (declared as `var version = "dev"` in package
    # main); `fused --version` / `orchestrator --version` report the release tag,
    # which the self-host updater (host-agent/fc-update.sh) compares against GitHub.
    ldflags:
      - -s -w -X main.version={{.Version}}

  - id: dbcheck
    main: ./cmd/dbcheck
    binary: dbcheck
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64
    # See the note above to inject version metadata via -X main.version={{.Version}} etc.
    ldflags:
      - -s -w -X main.version={{.Version}}

  # fused: the reference in-guest agent baked into the microVM rootfs (or fetched
  # at boot via AGENT_DOWNLOAD_URL / start-agent download_url). Linux only — it
  # runs inside a Firecracker guest, never on the control-plane host.
  - id: fused
    main: ./cmd/fused
    binary: fused
    env:
      - CGO_ENABLED=0
    goos:
      - linux
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X main.version={{.Version}}

archives:
  # Control-plane archive (orchestrator + dbcheck) as a tarball.
  - id: default
    ids:
      - orchestrator
      - dbcheck
    formats:
      - tar.gz
    name_template: >-
      {{ .ProjectName }}_
      {{- title .Os }}_
      {{- if eq .Arch "amd64" }}x86_64
      {{- else if eq .Arch "386" }}i386
      {{- else }}{{ .Arch }}{{ end }}
    files:
      - src: README.md
      # LICENSE* / CHANGELOG* are included automatically by goreleaser.
      - src: LICENSE*

  # fused as a raw, directly-downloadable binary asset, so AGENT_DOWNLOAD_URL and
  # the self-host updater can fetch it without unpacking a tarball, e.g.
  #   https://github.com/folsomintel/fuse/releases/download/<tag>/fused_Linux_x86_64
  - id: fused
    ids:
      - fused
    formats:
      - binary
    name_template: >-
      fused_
      {{- title .Os }}_
      {{- if eq .Arch "amd64" }}x86_64
      {{- else if eq .Arch "386" }}i386
      {{- else }}{{ .Arch }}{{ end }}

checksum:
  name_template: checksums.txt
  algorithm: sha256

snapshot:
  version_template: "{{ incpatch .Version }}-SNAPSHOT"

changelog:
  use: git
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
      - "^ci:"
      - "^build:"
      - "^style:"
      - "^refactor:"
      - "Merge pull request"
      - "Merge branch"
  groups:
    - title: Features
      regexp: '^.*?feat(\(.+\))??!?:.+$'
      order: 0
    - title: Bug fixes
      regexp: '^.*?fix(\(.+\))??!?:.+$'
      order: 1
    - title: Performance improvements
      regexp: '^.*?perf(\(.+\))??!?:.+$'
      order: 2
    - title: Others
      order: 999

release:
  github:
    owner: folsomintel
    name: fuse
