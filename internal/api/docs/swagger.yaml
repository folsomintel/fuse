basePath: /
definitions:
  api.APIKey:
    properties:
      created_at:
        type: string
      id:
        type: string
      label:
        type: string
      last_used_at:
        type: string
      revoked_at:
        type: string
    type: object
  api.APIKeyList:
    properties:
      api_keys:
        items:
          $ref: '#/definitions/api.APIKey'
        type: array
    type: object
  api.CreateAPIKeyRequest:
    properties:
      label:
        type: string
    type: object
  api.CreateAPIKeyResponse:
    properties:
      created_at:
        type: string
      id:
        type: string
      key:
        type: string
      label:
        type: string
      last_used_at:
        type: string
      revoked_at:
        type: string
    type: object
  api.CreateEnvironmentRequest:
    properties:
      expose:
        items:
          $ref: '#/definitions/api.ExposeSpec'
        type: array
      gateway_token:
        type: string
      gateway_url:
        type: string
      manifest_inline:
        type: string
      secrets:
        additionalProperties:
          type: string
        type: object
      spec:
        $ref: '#/definitions/api.ResourceSpec'
      startup_script:
        type: string
      task_id:
        type: string
    type: object
  api.CreateSnapshotRequest:
    properties:
      comment:
        type: string
      export_ref:
        type: string
      export_status:
        type: string
      metadata:
        additionalProperties:
          type: string
        type: object
      mode:
        type: string
      retention_seconds:
        type: integer
    type: object
  api.Endpoint:
    properties:
      as:
        type: string
      port:
        type: integer
      url:
        type: string
    type: object
  api.Environment:
    properties:
      created_at:
        type: string
      endpoints:
        items:
          $ref: '#/definitions/api.Endpoint'
        type: array
      error:
        type: string
      host_id:
        type: string
      id:
        type: string
      spec:
        $ref: '#/definitions/api.ResourceSpec'
      state:
        type: string
      task_id:
        type: string
      updated_at:
        type: string
      url:
        type: string
    type: object
  api.EnvironmentList:
    properties:
      environments:
        items:
          $ref: '#/definitions/api.Environment'
        type: array
    type: object
  api.Error:
    properties:
      error:
        $ref: '#/definitions/api.ErrorBody'
    type: object
  api.ErrorBody:
    properties:
      code:
        type: string
      details:
        additionalProperties:
          type: string
        type: object
      message:
        type: string
    type: object
  api.ExposeSpec:
    properties:
      as:
        type: string
      port:
        type: integer
    type: object
  api.HostCapacity:
    properties:
      cpus:
        type: integer
      gpu_kind:
        type: string
      gpus:
        type: integer
      ram_mb:
        type: integer
      storage_gb:
        type: integer
      vm_count:
        type: integer
    type: object
  api.HostInfo:
    properties:
      allocated:
        $ref: '#/definitions/api.HostCapacity'
      backend:
        type: string
      capacity:
        $ref: '#/definitions/api.HostCapacity'
      created_at:
        type: string
      id:
        type: string
      last_seen:
        type: string
      region:
        type: string
      state:
        type: string
      updated_at:
        type: string
      url:
        type: string
    type: object
  api.HostList:
    properties:
      hosts:
        items:
          $ref: '#/definitions/api.HostInfo'
        type: array
    type: object
  api.RegisterHostRequest:
    properties:
      backend:
        type: string
      capacity:
        $ref: '#/definitions/api.HostCapacity'
      id:
        type: string
      region:
        type: string
      token:
        type: string
      url:
        type: string
    type: object
  api.ResourceSpec:
    properties:
      cpus:
        type: integer
      gpu_kind:
        type: string
      gpus:
        type: integer
      image:
        type: string
      max_runtime_seconds:
        type: integer
      ram_mb:
        type: integer
      region:
        type: string
      storage_gb:
        type: integer
    type: object
  api.Snapshot:
    properties:
      comment:
        type: string
      created_at:
        type: string
      export_ref:
        type: string
      exports:
        items:
          $ref: '#/definitions/api.SnapshotExport'
        type: array
      id:
        type: string
      last_error:
        type: string
      mode:
        type: string
      parent_snapshot_id:
        type: string
      retention_until:
        type: string
      size_bytes:
        type: integer
      state:
        type: string
      task_id:
        type: string
      tenant_id:
        type: string
      updated_at:
        type: string
      vm_id:
        type: string
    type: object
  api.SnapshotExport:
    properties:
      destination:
        type: string
      last_error:
        type: string
      requested_at:
        type: string
      status:
        type: string
      updated_at:
        type: string
    type: object
  api.SnapshotList:
    properties:
      snapshots:
        items:
          $ref: '#/definitions/api.Snapshot'
        type: array
    type: object
  api.loginRequest:
    properties:
      token:
        type: string
    type: object
host: localhost:8080
info:
  contact: {}
  description: Control plane for Fuse orchestrator. Provisions, inspects, and destroys
    VMs; manages snapshots.
  title: Fuse Orchestrator API
  version: 0.1.0
paths:
  /login:
    post:
      consumes:
      - application/json
      description: Exchanges the shared access token for an HttpOnly session cookie.
      parameters:
      - description: Access token
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/api.loginRequest'
      produces:
      - application/json
      responses:
        "204":
          description: No Content
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/api.Error'
      summary: Log in
      tags:
      - auth
  /logout:
    post:
      description: Clears the session cookie.
      responses:
        "204":
          description: No Content
      summary: Log out
      tags:
      - auth
  /v1/api-keys:
    get:
      description: Lists API key metadata (never the keys themselves).
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/api.APIKeyList'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/api.Error'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/api.Error'
      summary: List API keys
      tags:
      - api-keys
    post:
      consumes:
      - application/json
      description: Mints a new revocable API key. The raw key is returned once and
        cannot be recovered.
      parameters:
      - description: Optional label
        in: body
        name: body
        schema:
          $ref: '#/definitions/api.CreateAPIKeyRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/api.CreateAPIKeyResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/api.Error'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/api.Error'
      summary: Create API key
      tags:
      - api-keys
  /v1/api-keys/{id}:
    delete:
      description: Revokes an API key by id. Idempotent.
      parameters:
      - description: API key id
        in: path
        name: id
        required: true
        type: string
      responses:
        "204":
          description: No Content
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/api.Error'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/api.Error'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/api.Error'
      summary: Revoke API key
      tags:
      - api-keys
  /v1/environments:
    get:
      parameters:
      - description: Filter by task ID
        in: query
        name: task_id
        type: string
      - description: Filter by state
        enum:
        - provisioning
        - running
        - destroying
        in: query
        name: state
        type: string
      - description: Filter by host ID
        in: query
        name: host_id
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/api.EnvironmentList'
      security:
      - BearerAuth: []
      summary: List environments
      tags:
      - environments
    post:
      consumes:
      - application/json
      description: Creates a VM, uploads the manifest, starts the guest agent, and
        assigns the task.
      parameters:
      - description: Environment spec
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/api.CreateEnvironmentRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/api.Environment'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/api.Error'
        "409":
          description: Conflict
          schema:
            $ref: '#/definitions/api.Error'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/api.Error'
        "503":
          description: Service Unavailable
          schema:
            $ref: '#/definitions/api.Error'
      security:
      - BearerAuth: []
      summary: Create environment
      tags:
      - environments
  /v1/environments/{vmId}:
    delete:
      description: Forcefully destroys the VM and marks its task failed.
      parameters:
      - description: VM identifier
        in: path
        name: vmId
        required: true
        type: string
      responses:
        "204":
          description: VM destroyed
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/api.Error'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/api.Error'
      security:
      - BearerAuth: []
      summary: Destroy environment
      tags:
      - environments
    get:
      parameters:
      - description: VM identifier
        in: path
        name: vmId
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/api.Environment'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/api.Error'
      security:
      - BearerAuth: []
      summary: Get environment
      tags:
      - environments
    post:
      description: 'Perform an action on an environment. Supports: rotate-token, drain,
        fork.'
      parameters:
      - description: VM identifier
        in: path
        name: vmId
        required: true
        type: string
      - description: Action to perform
        enum:
        - rotate-token
        - drain
        - fork
        in: query
        name: action
        required: true
        type: string
      responses:
        "200":
          description: Drain succeeded; updated VM state returned
          schema:
            $ref: '#/definitions/api.Environment'
        "201":
          description: Fork succeeded; new environment returned
          schema:
            $ref: '#/definitions/api.Environment'
        "204":
          description: Action succeeded
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/api.Error'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/api.Error'
        "409":
          description: Conflict
          schema:
            $ref: '#/definitions/api.Error'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/api.Error'
      security:
      - BearerAuth: []
      summary: Environment action
      tags:
      - environments
  /v1/environments/{vmId}/events:
    get:
      description: Server-Sent Events stream of state-change events for a VM. Replaces
        polling GET /v1/environments/{vmId}.
      parameters:
      - description: VM identifier
        in: path
        name: vmId
        required: true
        type: string
      - description: Resume cursor from a previous event id (ignored in v1 — included
          for forward compatibility)
        in: query
        name: last_event_id
        type: string
      produces:
      - text/event-stream
      responses:
        "200":
          description: SSE stream
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/api.Error'
      security:
      - BearerAuth: []
      summary: Stream environment state events
      tags:
      - environments
  /v1/environments/{vmId}/snapshots:
    post:
      consumes:
      - application/json
      parameters:
      - description: VM identifier
        in: path
        name: vmId
        required: true
        type: string
      - description: Snapshot options
        in: body
        name: body
        schema:
          $ref: '#/definitions/api.CreateSnapshotRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/api.Snapshot'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/api.Error'
        "409":
          description: Conflict
          schema:
            $ref: '#/definitions/api.Error'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/api.Error'
      security:
      - BearerAuth: []
      summary: Create snapshot
      tags:
      - snapshots
  /v1/hosts:
    get:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/api.HostList'
      security:
      - BearerAuth: []
      summary: List hosts
      tags:
      - hosts
    post:
      consumes:
      - application/json
      parameters:
      - description: Host registration
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/api.RegisterHostRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/api.HostInfo'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/api.Error'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/api.Error'
      security:
      - BearerAuth: []
      summary: Register host
      tags:
      - hosts
  /v1/hosts/{hostId}:
    delete:
      parameters:
      - description: Host identifier
        in: path
        name: hostId
        required: true
        type: string
      responses:
        "204":
          description: Host removed
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/api.Error'
        "409":
          description: Conflict
          schema:
            $ref: '#/definitions/api.Error'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/api.Error'
      security:
      - BearerAuth: []
      summary: Remove host
      tags:
      - hosts
    get:
      parameters:
      - description: Host identifier
        in: path
        name: hostId
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/api.HostInfo'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/api.Error'
      security:
      - BearerAuth: []
      summary: Get host
      tags:
      - hosts
    post:
      description: 'Perform an action on a host. Supports: cordon (mark unschedulable),
        uncordon (return to scheduling).'
      parameters:
      - description: Host identifier
        in: path
        name: hostId
        required: true
        type: string
      - description: Action to perform
        enum:
        - cordon
        - uncordon
        in: query
        name: action
        required: true
        type: string
      responses:
        "204":
          description: Action succeeded
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/api.Error'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/api.Error'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/api.Error'
      security:
      - BearerAuth: []
      summary: Host action
      tags:
      - hosts
  /v1/snapshots:
    get:
      parameters:
      - description: Filter by VM ID
        in: query
        name: vm_id
        type: string
      - description: Filter by task ID
        in: query
        name: task_id
        type: string
      - description: Filter by tenant ID
        in: query
        name: tenant_id
        type: string
      - description: Filter by state
        enum:
        - creating
        - ready
        - restoring
        - deleting
        - error
        in: query
        name: state
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/api.SnapshotList'
      security:
      - BearerAuth: []
      summary: List snapshots
      tags:
      - snapshots
  /v1/snapshots/{snapshotId}:
    delete:
      parameters:
      - description: Snapshot identifier
        in: path
        name: snapshotId
        required: true
        type: string
      responses:
        "204":
          description: Snapshot deleted
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/api.Error'
        "409":
          description: Conflict
          schema:
            $ref: '#/definitions/api.Error'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/api.Error'
      security:
      - BearerAuth: []
      summary: Delete snapshot
      tags:
      - snapshots
    get:
      parameters:
      - description: Snapshot identifier
        in: path
        name: snapshotId
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/api.Snapshot'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/api.Error'
      security:
      - BearerAuth: []
      summary: Get snapshot
      tags:
      - snapshots
    post:
      description: 'Perform an action on a snapshot. Currently supports: restore.'
      parameters:
      - description: Snapshot identifier
        in: path
        name: snapshotId
        required: true
        type: string
      - description: Action to perform
        enum:
        - restore
        in: query
        name: action
        required: true
        type: string
      responses:
        "204":
          description: Action succeeded
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/api.Error'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/api.Error'
        "409":
          description: Conflict
          schema:
            $ref: '#/definitions/api.Error'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/api.Error'
      security:
      - BearerAuth: []
      summary: Snapshot action
      tags:
      - snapshots
securityDefinitions:
  BearerAuth:
    in: header
    name: Authorization
    type: apiKey
swagger: "2.0"
